services:
  postgres:
    image: postgres:16
    container_name: secret-notes-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: encr_notes
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: secret-notes-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-blue
      - frontend-green
      - backend-blue
      - backend-green
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend-blue:
    image: ${BACKEND_IMAGE:-cinnamon0/secret-notes:backend-latest}
    container_name: secret-notes-backend-blue
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/encr_notes}
      DATABASE_SSL: ${DATABASE_SSL:-false}
    expose:
      - "3000"
    command: sh -c "npm run db:migrate && npm start"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend-blue:
    image: ${FRONTEND_IMAGE:-cinnamon0/secret-notes:frontend-latest}
    container_name: secret-notes-frontend-blue
    environment:
      VITE_API_URL: http://backend-blue:3000
    expose:
      - "80"
    depends_on:
      - backend-blue

  backend-green:
    image: ${BACKEND_IMAGE:-cinnamon0/secret-notes:backend-latest}
    container_name: secret-notes-backend-green
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/encr_notes}
      DATABASE_SSL: ${DATABASE_SSL:-false}
    expose:
      - "3001"
    command: sh -c "npm run db:migrate && npm start"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend-green:
    image: ${FRONTEND_IMAGE:-cinnamon0/secret-notes:frontend-latest}
    container_name: secret-notes-frontend-green
    environment:
      VITE_API_URL: http://backend-green:3001
    expose:
      - "80"
    depends_on:
      - backend-green

volumes:
  postgres_data:
