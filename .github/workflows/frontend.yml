name: frontend-ci

on:
  push:
    branches:
      - main
      - deploy/production
    paths:
      - 'secret-notes-frontend/**'
      - '.github/workflows/frontend.yml'
      - 'Jenkinsfile'
  pull_request:
    branches:
      - main
      - deploy/production
    paths:
      - 'secret-notes-frontend/**'
      - '.github/workflows/frontend.yml'
      - 'Jenkinsfile'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secret-notes-frontend
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_FRONTEND_PROJECT_KEY: ${{ secrets.SONAR_FRONTEND_PROJECT_KEY }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: secret-notes-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Snyk security scan
        if: ${{ env.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        run: |
          npx snyk auth "$SNYK_TOKEN"
          npx snyk test --severity-threshold=high

      - name: Skip Snyk (token missing)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "Snyk skipped — SNYK_TOKEN not configured"

      - name: Unit tests
        run: npm test

      - name: SonarQube scan
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_FRONTEND_PROJECT_KEY != '' }}
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_FRONTEND_PROJECT_KEY }}
            -Dsonar.projectName=secret-notes-frontend
            -Dsonar.sources=src
            -Dsonar.tests=tests,e2e
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**

      - name: Skip SonarQube (secrets missing)
        if: ${{ !(env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_FRONTEND_PROJECT_KEY != '') }}
        run: echo "SonarQube skipped — secrets not configured"

      - name: Build
        run: npm run build

  e2e:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secret-notes-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: secret-notes-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

  k6:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: verify
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run k6 performance test
        run: docker run --rm -i -e BASE_URL=http://54.213.150.110 grafana/k6 run - < k6/backend-loadtest.js; echo "k6 exit=$? (non-blocking)"

  deliver:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: [verify, e2e, k6]
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/build-push-action@v6
        with:
          context: secret-notes-frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:frontend-${{ github.sha }}
            ${{ env.DOCKERHUB_REPOSITORY }}:frontend-latest

  deploy:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: deliver
    runs-on: ubuntu-latest
    env:
      AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
      AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
      AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Deploy to AWS EC2
        if: ${{ env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.AWS_DEPLOY_HOST }}
          username: ${{ env.AWS_DEPLOY_USER }}
          key: ${{ env.AWS_DEPLOY_SSH_KEY }}
          envs: DOCKERHUB_REPOSITORY
          script: |
            set -e
            FRONTEND_IMAGE="${DOCKERHUB_REPOSITORY:-cinnamon0/secret-notes}:frontend-latest"
            export FRONTEND_IMAGE
            echo "Deploy frontend image ${FRONTEND_IMAGE} from Docker Hub"
            cd /opt/secret-notes
            docker compose -f docker-compose.prod.yml pull frontend-blue frontend-green
            docker compose -f docker-compose.prod.yml up -d --no-build frontend-blue frontend-green
            echo "Running blue/green health check and switch..."
            bash blue-green-switch.sh

      - name: Skip deploy when secrets are missing
        if: ${{ !(env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '' && env.DOCKERHUB_REPOSITORY != '') }}
        run: echo "Deploy skipped because AWS or Docker Hub secrets are not configured"

  notify:
    if: failure() && github.ref == 'refs/heads/deploy/production'
    needs: [verify, e2e, deliver, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Failure notification
        run: echo "frontend-ci FAILED ΓÇö notification sent to ${{ secrets.NOTIFICATION_EMAIL }}"
