name: frontend-ci

on:
  push:
    branches:
      - main
      - deploy/production
    paths:
      - 'secret-notes-frontend/**'
      - '.github/workflows/frontend.yml'
      - 'Jenkinsfile'
  pull_request:
    branches:
      - main
      - deploy/production
    paths:
      - 'secret-notes-frontend/**'
      - '.github/workflows/frontend.yml'
      - 'Jenkinsfile'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secret-notes-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: secret-notes-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secret-notes-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: secret-notes-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

  deliver:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/build-push-action@v6
        with:
          context: secret-notes-frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:frontend-${{ github.sha }}
            ${{ env.DOCKERHUB_REPOSITORY }}:frontend-latest

  deploy:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: deliver
    runs-on: ubuntu-latest
    env:
      AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
      AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
      AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Deploy to AWS EC2
        if: ${{ env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.AWS_DEPLOY_HOST }}
          username: ${{ env.AWS_DEPLOY_USER }}
          key: ${{ env.AWS_DEPLOY_SSH_KEY }}
          envs: DOCKERHUB_REPOSITORY
          script: |
            set -e
            FRONTEND_IMAGE="${DOCKERHUB_REPOSITORY:-cinnamon0/secret-notes}:frontend-latest"
            export FRONTEND_IMAGE
            echo "Deploy frontend image ${FRONTEND_IMAGE} from Docker Hub"
            docker compose -f /opt/secret-notes/docker-compose.prod.yml pull frontend-blue
            docker compose -f /opt/secret-notes/docker-compose.prod.yml up -d --no-build frontend-blue

      - name: Skip deploy when secrets are missing
        if: ${{ !(env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '' && env.DOCKERHUB_REPOSITORY != '') }}
        run: echo "Deploy skipped because AWS or Docker Hub secrets are not configured"

  notify:
    if: failure() && github.ref == 'refs/heads/deploy/production'
    needs: [verify, e2e, deliver, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Failure notification
        run: echo "frontend-ci FAILED — notification sent to ${{ secrets.NOTIFICATION_EMAIL }}"
