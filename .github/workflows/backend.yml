name: backend-ci

on:
  push:
    branches:
      - main
      - deploy/production
    paths:
      - 'secret-notes-backend/**'
      - '.github/workflows/backend.yml'
      - 'Jenkinsfile'
  pull_request:
    branches:
      - main
      - deploy/production
    paths:
      - 'secret-notes-backend/**'
      - '.github/workflows/backend.yml'
      - 'Jenkinsfile'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secret-notes-backend
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_BACKEND_PROJECT_KEY: ${{ secrets.SONAR_BACKEND_PROJECT_KEY }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: secret-notes-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Snyk security scan
        if: ${{ env.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        run: |
          npx snyk auth "$SNYK_TOKEN"
          npx snyk test --severity-threshold=high

      - name: Skip Snyk (token missing)
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "Snyk skipped — SNYK_TOKEN not configured"

      - name: Test
        run: npm test

      - name: SonarQube scan
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_BACKEND_PROJECT_KEY != '' }}
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_BACKEND_PROJECT_KEY }}
            -Dsonar.projectName=secret-notes-backend
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**

      - name: Skip SonarQube (secrets missing)
        if: ${{ !(env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_BACKEND_PROJECT_KEY != '') }}
        run: echo "SonarQube skipped — secrets not configured"

      - name: Build Docker image
        run: docker build -t secret-notes-backend:${{ github.sha }} .

  deliver:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    defaults:
      run:
        working-directory: secret-notes-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/build-push-action@v6
        with:
          context: secret-notes-backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:backend-${{ github.sha }}
            ${{ env.DOCKERHUB_REPOSITORY }}:backend-latest

  deploy:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: deliver
    runs-on: ubuntu-latest
    env:
      AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
      AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
      AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Deploy to AWS EC2
        if: ${{ env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.AWS_DEPLOY_HOST }}
          username: ${{ env.AWS_DEPLOY_USER }}
          key: ${{ env.AWS_DEPLOY_SSH_KEY }}
          envs: DOCKERHUB_REPOSITORY
          script: |
            set -e
            BACKEND_IMAGE="${DOCKERHUB_REPOSITORY:-cinnamon0/secret-notes}:backend-latest"
            export BACKEND_IMAGE
            echo "Deploy backend image ${BACKEND_IMAGE} from Docker Hub"
            cd /opt/secret-notes
            docker compose -f docker-compose.prod.yml pull backend-blue backend-green
            docker compose -f docker-compose.prod.yml up -d --no-build backend-blue backend-green

      - name: Skip deploy when secrets are missing
        if: ${{ !(env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '' && env.DOCKERHUB_REPOSITORY != '') }}
        run: echo "Deploy skipped because AWS or Docker Hub secrets are not configured"

  notify:
    if: failure() && github.ref == 'refs/heads/deploy/production'
    needs: [verify, deliver, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Failure notification
        run: echo "backend-ci FAILED ΓÇö notification sent to ${{ secrets.NOTIFICATION_EMAIL }}"
