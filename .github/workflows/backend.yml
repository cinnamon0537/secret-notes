name: backend-ci

on:
  push:
    branches:
      - main
      - deploy/production
    paths:
      - 'SecretNotes/secret-notes-backend/**'
      - '.github/workflows/backend.yml'
      - 'Jenkinsfile'
      - 'CI_CD.md'
  pull_request:
    branches:
      - main
      - deploy/production
    paths:
      - 'SecretNotes/secret-notes-backend/**'
      - '.github/workflows/backend.yml'
      - 'Jenkinsfile'
      - 'CI_CD.md'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SecretNotes/secret-notes-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: SecretNotes/secret-notes-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Docker image
        run: docker build -t secret-notes-backend:${{ github.sha }} .

  deliver:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
    defaults:
      run:
        working-directory: SecretNotes/secret-notes-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/build-push-action@v6
        with:
          context: SecretNotes/secret-notes-backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPOSITORY }}:backend-${{ github.sha }}
            ${{ env.DOCKERHUB_REPOSITORY }}:backend-latest

  deploy:
    if: github.ref == 'refs/heads/deploy/production' && github.event_name == 'push'
    needs: deliver
    runs-on: ubuntu-latest
    env:
      AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
      AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
      AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
    steps:
      - name: Deploy to AWS EC2
        if: ${{ env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.AWS_DEPLOY_HOST }}
          username: ${{ env.AWS_DEPLOY_USER }}
          key: ${{ env.AWS_DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "Deploy backend image ${DOCKERHUB_REPOSITORY:-unknown} from Docker Hub"
            docker compose -f /opt/secret-notes/docker-compose.yml up -d backend

      - name: Skip deploy when secrets are missing
        if: ${{ !(env.AWS_DEPLOY_HOST != '' && env.AWS_DEPLOY_USER != '' && env.AWS_DEPLOY_SSH_KEY != '') }}
        run: echo "Deploy skipped because AWS secrets are not configured"
