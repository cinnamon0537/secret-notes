services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: secret-notes-sonarqube
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

  postgres:
    image: postgres:16
    container_name: secret-notes-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: encr_notes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: ${BACKEND_IMAGE:-secret-notes-backend-backend}
    build: .
    container_name: secret-notes-backend
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/encr_notes}
      DATABASE_SSL: ${DATABASE_SSL:-false}
    ports:
      - "3000:3000"
    command: sh -c "npm run db:migrate && npm start"

  frontend:
    image: ${FRONTEND_IMAGE:-secret-notes-backend-frontend}
    build: ../secret-notes-frontend
    container_name: secret-notes-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000
    ports:
      - "80:80"

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
